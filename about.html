<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linden Hansen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon/favicon.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root { color-scheme: light; }

    body {
      background: #ffffff;
      color: #000000;
      font-family: 'IM Fell English', serif;
      height: 100vh;
      overflow: hidden;
    }

    a { color: #000000; text-decoration: none; }
    a:hover { color: #49739D; text-decoration: none; }

    /* ── HEADER ───────────────────────────────────────────── */

    header {
      height: 76px;
      text-align: center;
      padding: 28px 0 0;
    }

    .logo-link { display: inline-block; line-height: 0; }
    .logo-link:hover { color: inherit; }
    .logo-link img { height: 44px; width: auto; display: block; transition: filter 0.2s ease; }
    .logo-link:hover img { filter: brightness(0) saturate(100%) invert(43%) sepia(16%) saturate(1109%) hue-rotate(175deg) brightness(93%); }

    /* ── THREE-COLUMN LAYOUT ──────────────────────────────── */

    .page {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr;
      height: calc(100vh - 76px);
      overflow: hidden;
    }

    /* ── LEFT COLUMN: persistent nav ─────────────────────── */

    .col-left {
      padding-top: 33vh;
      padding-left: 3.5vw;
      padding-right: 1.5vw;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      column-gap: 18px;
      row-gap: 14px;
      align-items: baseline;
    }

    .cat {
      font-style: italic;
      font-size: 22px;
      line-height: 1.3;
      text-align: right;
      white-space: nowrap;
    }

    .desc {
      font-size: 13px;
      line-height: 1.55;
      text-align: justify;
    }

    .nav-spacer { grid-column: 1 / -1; height: 14px; }
    .ext-pad { display: block; }
    .ext { font-style: italic; font-size: 13px; line-height: 1.65; }

    /* ── MIDDLE COLUMN: justified moodboard ──────────────── */

    .col-mid {
      padding: 1.5vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /*
      Justified mosaic: images arranged in 4 rows.
      Each row's flex value is proportional to its target height,
      derived from the aspect ratios of images it contains.

      Row 1 (h≈244): cormac(0.44) + whole earth(0.73) + margiela(0.80) → sum 1.97
      Row 2 (h≈143): norwegian(1.50) + ghibli(1.85)                     → sum 3.35
      Row 3 (h≈145): concert(0.79) + fashion(1.25) + flannery(1.27)     → sum 3.31
      Row 4 (h≈155): desert(1.60) + chatgpt(1.50)                       → sum 3.10
    */

    .moodboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: hidden;
    }

    .mb-row {
      display: flex;
      gap: 3px;
      min-height: 0;
    }

    .mb-row:nth-child(1) { flex: 244; }
    .mb-row:nth-child(2) { flex: 143; }
    .mb-row:nth-child(3) { flex: 145; }
    .mb-row:nth-child(4) { flex: 155; }

    /* Each <a> has inline style="flex: <aspect-ratio>" */
    .mb-row a {
      display: block;
      overflow: hidden;
      min-width: 0;
      transition: transform 0.2s ease;
    }

    .mb-row a:hover {
      transform: scale(0.97);
    }

    .mb-row img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── RIGHT COLUMN: hover label ────────────────────────── */

    .col-right {
      padding: 1.5vw;
      padding-top: 33vh;
    }

    .hover-label {
      font-style: italic;
      font-size: 13px;
      line-height: 1.6;
      color: #000000;
    }


    /* ── MOBILE ───────────────────────────────────────────── */

    .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #000000;
      padding: 0 4px;
      line-height: 1;
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nav-close {
      display: none;
    }

    @media (max-width: 768px) {
      header {
        position: relative;
      }

      .hamburger {
        display: block;
      }

      /* Nav slides over full screen */
      .col-left {
        display: none;
        position: fixed;
        inset: 0;
        background: #ffffff;
        z-index: 500;
        padding: 80px 8vw 8vw;
        overflow-y: auto;
        padding-top: 80px;
      }

      .col-left.nav-open {
        display: block;
      }

      .nav-close {
        display: block;
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: #000000;
        font-family: 'IM Fell English', serif;
        padding: 0;
        line-height: 1;
      }

      /* Single-column layout */
      .page {
        grid-template-columns: 1fr !important;
        height: auto !important;
        overflow: visible !important;
      }

      body {
        height: auto !important;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .col-right {
        display: none !important;
      }

      .col-mid {
        height: auto !important;
        overflow: visible !important;
        min-height: calc(100vh - 76px);
        padding: 1.5vh 4vw;
      }

      /* Moodboard: stack all images vertically */
      .moodboard {
        height: auto !important;
        overflow: visible !important;
      }

      .mb-row {
        flex: none !important;
        flex-direction: column;
        height: auto !important;
      }

      .mb-row a,
      .mb-item {
        flex: none !important;
        width: 100% !important;
      }

      .mb-row a img,
      .mb-item img,
      .mb-row img {
        height: auto !important;
        object-fit: contain !important;
        width: 100% !important;
      }

      /* Single images in scrollable pages */
      .col-mid > img,
      .col-mid .row-2 img,
      .col-mid .row-3 img,
      .col-mid .row-4 img,
      .col-mid .grid-2x2 img,
      .col-mid .grid-3x2 img,
      .col-mid .navy-bg img,
      .thumb {
        width: 100% !important;
        height: auto !important;
      }

      /* Multi-image rows become single column */
      .row-2, .row-3, .row-4 {
        flex-direction: column !important;
      }

      .row-2 img, .row-3 img, .row-4 img {
        width: 100% !important;
        flex: none !important;
      }

      /* Greeting */
      .greeting {
        font-size: clamp(36px, 14vw, 72px) !important;
      }

      /* Under construction */
      .col-mid p {
        padding-top: 40vh;
      }

      /* Bio image */
      .col-mid img {
        height: auto !important;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="about.html" class="logo-link">
      <img src="logo.png" alt="CB">
    </a>
  <button class="hamburger" id="hamburger">&#9776;</button>
  </header>

  <div class="page">

    <!-- LEFT: persistent navigation -->
    <div class="col-left">
      <button class="nav-close" id="nav-close">&#x2715;</button>
      <div class="nav-grid">

        <a class="cat" href="product.html">PRODUCT</a>
        <span class="desc">Building things for humans.</span>

        <a class="cat" href="design.html">DESIGN</a>
        <span class="desc">Playing with color, space, word, and tone.</span>

        <a class="cat" href="research.html">RESEARCH</a>
        <span class="desc">Always learning.</span>

        <a class="cat" href="other.html">OTHER</a>
        <span class="desc">Just for fun.</span>

        <a class="cat" href="photo.html">PHOTO</a>
        <span class="desc">Capturing life and loved ones.</span>

        <div class="nav-spacer"></div>

        <span class="ext-pad"></span>
        <a class="ext" href="bio.html">BIO</a>

        <span class="ext-pad"></span>
        <a class="ext" href="https://brandnewgirl.substack.com/" target="_blank">SUBSTACK</a>

        <span class="ext-pad"></span>
        <a class="ext" href="https://www.are.na/linden-hansen/channels" target="_blank">ARE.NA</a>

        <span class="ext-pad"></span>
        <a class="ext" href="https://www.linkedin.com/in/linden-hansen/" target="_blank">LINKEDIN</a>

        <span class="ext-pad"></span>
        <a class="ext" href="mailto:lindenh@stanford.edu">EMAIL</a>

      </div>
    </div>

    <!-- MIDDLE: justified moodboard, no scroll, no cropping -->
    <div class="col-mid">
      <div class="moodboard">

        <!-- Row 1: tall portrait images -->
        <div class="mb-row">
          <a href="https://en.wikipedia.org/wiki/The_Road"
             target="_blank" style="flex: 0.44"
             data-label="The Road by Cormac McCarthy">
            <img src="cormac.png" alt="Cormac McCarthy, The Road">
          </a>
          <a href="https://wholeearth.info/"
             target="_blank" style="flex: 0.73"
             data-label="Whole Earth Catalog">
            <img src="wholeearthcatalo00unse_8_0001.jpg" alt="Whole Earth Catalog">
          </a>
          <a href="https://www.maisonmargiela.com/en-us/mm-artisanal-spring-summer-2024.html"
             target="_blank" style="flex: 0.80"
             data-label="Maison Margiela Spring Summer Artisanal 2024 Collection">
            <img src="margiellass24.jpg" alt="Maison Margiela SS24 Artisanal">
          </a>
        </div>

        <!-- Row 2: wide landscapes -->
        <div class="mb-row">
          <a href="https://en.wikipedia.org/wiki/Ex_Machina_(film)"
             target="_blank" style="flex: 1.50"
             data-label="Ex Machina (2014)">
            <img src="ex-machina.png" alt="Ex Machina (2014)">
          </a>
          <a href="https://en.wikipedia.org/wiki/Spirited_Away"
             target="_blank" style="flex: 1.85"
             data-label="Spirited Away (2001)">
            <img src="9e68bb4a1955557d9803976bfab67c2d.jpg" alt="Spirited Away (2001)">
          </a>
        </div>

        <!-- Row 3: mixed orientations -->
        <div class="mb-row">
          <a href="https://www.youtube.com/watch?v=_HZM0QiuUS8"
             target="_blank" style="flex: 0.79"
             data-label="Iris (Live in Buffalo, NY, 7/4/2004)">
            <img src="iris.png" alt="Iris live 2004">
          </a>
          <a href="https://palomawool.com/pages/aw25-campaign"
             target="_blank" style="flex: 1.25"
             data-label="Paloma Wool AW25 campaign">
            <img src="paloma-wool.png" alt="Paloma Wool AW25">
          </a>
          <a href="https://repositorio.ufsc.br/bitstream/handle/123456789/160332/A%20good%20man%20is%20hard%20to%20find%20-%20Flannery%20O%27Connor.pdf"
             target="_blank" style="flex: 1.27"
             data-label="&quot;A Good Man is Hard to Find&quot; by Flannery O'Connor">
            <img src="flannery.png" alt="Flannery O'Connor quote">
          </a>
        </div>

        <!-- Row 4: wide landscapes -->
        <div class="mb-row">
          <a href="https://www.artsy.net/artwork/ryan-mcginley-dakota-hair"
             target="_blank" style="flex: 1.60"
             data-label="Dakota Hair, 2004">
            <img src="download.png" alt="Ryan McGinley, Dakota Hair 2004">
          </a>
          <a href="https://www.nytimes.com/2026/06/04/style/chatgpt-advertising-campaign-artificial-intelligence.html"
             target="_blank" style="flex: 1.50"
             data-label="ChatGPT's first campaign">
            <img src="chatgpt.png" alt="ChatGPT first campaign">
          </a>
        </div>

      </div>
    </div>

    <!-- RIGHT: hover description -->
    <div class="col-right">
      <p class="hover-label" id="hover-label"></p>
    </div>

  </div>

  <script>
    const label = document.getElementById('hover-label');
    document.querySelectorAll('.mb-row a').forEach(link => {
      link.addEventListener('mouseenter', () => {
        label.textContent = link.dataset.label;
      });
      link.addEventListener('mouseleave', () => {
        label.textContent = '';
      });
    });
  </script>


  <script>
    // Mobile nav toggle
    (function() {
      const hamburger = document.getElementById('hamburger');
      const colLeft   = document.querySelector('.col-left');
      const navClose  = document.getElementById('nav-close');
      if (!hamburger || !colLeft) return;
      hamburger.addEventListener('click', () => colLeft.classList.toggle('nav-open'));
      if (navClose) navClose.addEventListener('click', () => colLeft.classList.remove('nav-open'));
      colLeft.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => colLeft.classList.remove('nav-open'));
      });
    })();
  </script>
</body>
</html>
